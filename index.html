<!DOCTYPE html>
<html lang="zh-CN">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>带材缺陷比对系统【正式密码版】</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,pingfang-sc,sans-serif;padding:14px;max-width:700px;margin:0 auto}
input,button,textarea{width:100%;padding:10px;margin:6px 0;border:1px solid #ccc;border-radius:6px}
textarea{min-height:110px;font-size:14px}
button{background:#007bff;color:#fff;border:none;font-size:15px}
.sec{border:1px solid #ccc;padding:12px;margin:12px 0;border-radius:8px}
.title{font-weight:bold;margin-bottom:8px}
.list{max-height:280px;overflow:auto;background:#f9f9f9;padding:8px}
.item{display:flex;gap:10px;padding:6px;background:#fff;margin:4px 0;align-items:center}
.item span{flex:1;font-size:13px}
#result{white-space:pre-wrap;padding:10px;max-height:400px;overflow:auto;background:#fcfcfc;font-size:12px}
#loginBox{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;display:flex;align-items:center;justify-content:center;padding:20px}
</style>

<body>

<!-- 登录密码框 -->
<div id="loginBox">
  <div style="width:100%;max-width:400px">
    <h3>带材系统登录</h3>
    <input type="password" id="pwd" placeholder="请输入登录密码">
    <button onclick="login()">登录</button>
  </div>
</div>

<!-- 主界面 默认隐藏 -->
<div id="main" style="display:none">

<h2>带材缺陷比对系统【正式密码版】</h2>

<div class="sec">
  <div class="title">带材编号 & 轮次</div>
  <input id="stripNo" placeholder="带材编号">
  <input id="round" type="number" placeholder="轮次（1、2、3...无上限）" value="1">
</div>

<div class="sec">
  <div class="title">初筛人员（第1轮必须填）</div>
  <input id="screener" placeholder="初筛人员姓名">
</div>

<div class="sec">
  <div class="title">复核人员（第2轮及以后必须填）</div>
  <input id="reviewer" placeholder="复核人员姓名">
</div>

<div class="sec">
  <div class="title">① 粘贴 米数 列</div>
  <textarea id="meterArea" placeholder="直接粘贴Excel整列米数"></textarea>
</div>

<div class="sec">
  <div class="title">② 粘贴 缺陷名称 列</div>
  <textarea id="defectArea" placeholder="直接粘贴Excel整列缺陷"></textarea>
</div>

<button onclick="parse()">一键匹配：米数 ↔ 缺陷</button>

<div class="sec">
  <div class="title">当前列表 <span id="count">0</span> 条</div>
  <div class="list" id="items"></div>
  <button onclick="save()">保存到云端</button>
  <button onclick="clearList()" style="background:#dc3545">清空列表</button>
</div>

<div class="sec">
  <div class="title">对比 & 导出</div>
  <button onclick="loadAndCompare()">加载并对比所有轮次</button>
  <button onclick="exportResult()">导出对比结果Excel</button>
  <button onclick="exportFull()">导出全部原始数据Excel</button>
  <div id="result"></div>
</div>

</div>

<script>
// ====================== 登录密码 ======================
const RIGHT_PWD = "123456";  // 你可以自己改密码
function login(){
  const p = document.getElementById("pwd").value;
  if(p === RIGHT_PWD){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("main").style.display="block";
  }else{
    alert("密码错误");
  }
}

// ====================== 云端数据库 ======================
const DB_URL = "https://jsonblob.com/api/jsonBlob";
let DB_ID = localStorage.getItem("DB_ID") || "";
let list = [];

async function getCloud() {
  if (!DB_ID) return {};
  try {
    const res = await fetch(DB_URL + "/" + DB_ID, { signal: AbortSignal.timeout(10000) });
    return await res.json() || {};
  } catch (e) { return {}; }
}

async function saveCloud(data) {
  try {
    if (!DB_ID) {
      const r = await fetch(DB_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
        signal: AbortSignal.timeout(15000)
      });
      const loc = r.headers.get("Location");
      DB_ID = loc.split("/").pop();
      localStorage.setItem("DB_ID", DB_ID);
    } else {
      await fetch(DB_URL + "/" + DB_ID, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
        signal: AbortSignal.timeout(15000)
      });
    }
  } catch (e) {
    alert("云端同步失败，请检查网络");
  }
}

// 解析米数 & 缺陷
function parse() {
  const meterText = document.getElementById("meterArea").value.trim();
  const defectText = document.getElementById("defectArea").value.trim();
  if (!meterText || !defectText) { alert("请粘贴米数和缺陷"); return; }

  const meters = meterText.split("\n").map(s=>s.trim()).filter(s=>!isNaN(parseFloat(s))&&s);
  const defects = defectText.split("\n").map(s=>s.trim()).filter(s=>s);
  const minLen = Math.min(meters.length, defects.length);
  list = [];
  for(let i=0;i<minLen;i++){
    const m = parseFloat(meters[i]);
    const d = defects[i];
    if(!isNaN(m)&&d) list.push({meter:m,defect:d});
  }
  render();
  document.getElementById("meterArea").value="";
  document.getElementById("defectArea").value="";
}

function render(){
  document.getElementById("count").textContent=list.length;
  document.getElementById("items").innerHTML=list.map((it,i)=>`
  <div class="item">
    <span>${i+1}｜${it.meter}｜${it.defect}</span>
    <button onclick="del(${i})" style="width:auto;background:#dc3545;padding:4px 8px">删</button>
  </div>`).join("");
}

function del(i){list.splice(i,1);render();}
function clearList(){list=[];render();}

// 保存（带人员校验）
async function save(){
  const no = document.getElementById("stripNo").value.trim();
  const round = parseInt(document.getElementById("round").value)||1;
  const screener = document.getElementById("screener").value.trim();
  const reviewer = document.getElementById("reviewer").value.trim();

  if(!no){alert("请输入带材编号");return;}
  if(list.length===0){alert("请先匹配数据");return;}

  if(round===1){
    if(!screener){alert("第1轮必须填初筛人员");return;}
  }else{
    if(!reviewer){alert("第2轮起必须填复核人员");return;}
  }

  const data=await getCloud();
  if(!data[no]){
    data[no]={screener:screener,reviewer:reviewer,rounds:{}};
  }else{
    if(reviewer) data[no].reviewer=reviewer;
  }
  data[no].rounds[round]=list;
  await saveCloud(data);
  alert("保存成功！已同步云端");
  list=[];render();
}

// 对比
async function loadAndCompare(){
  const no=document.getElementById("stripNo").value.trim();
  if(!no){alert("请输入带材编号");return;}
  const data=await getCloud();
  const strip=data[no];
  if(!strip){alert("无此带材记录");return;}

  const roundsObj=strip.rounds||{};
  const rs=Object.keys(roundsObj).map(Number).sort((a,b)=>a-b);
  if(rs.length<2){alert("至少2轮才能对比");return;}

  const last=Math.max(...rs);
  const final=roundsObj[last];
  const res={
    stripNo:no,
    screener:strip.screener||"",
    reviewer:strip.reviewer||"",
    finalRound:last,
    rounds:[],
    changes:{}
  };

  rs.forEach(r=>{
    if(r===last)return;
    const curr=roundsObj[r];
    let err=0,total=curr.length;
    curr.forEach(it=>{
      const f=final.find(x=>x.meter===it.meter);
      if(!f)return;
      if(it.defect!==f.defect){
        err++;
        const key=it.defect+"→"+f.defect;
        res.changes[key]=(res.changes[key]||0)+1;
      }
    });
    res.rounds.push({
      round:r,total,err,rate:total?((err/total*100).toFixed(2))+"%":"0%"
    });
  });

  const totalC=Object.values(res.changes).reduce((a,b)=>a+b,0);
  res.changeStats=Object.entries(res.changes).map(([k,v])=>({
    change:k,count:v,pct:totalC?((v/totalC*100).toFixed(2))+"%":"0%"
  }));

  window._lastCompare=res;
  document.getElementById("result").textContent=JSON.stringify(res,null,2);
}

// 导出
function exportResult(){
  if(!window._lastCompare){alert("请先对比");return;}
  const d=window._lastCompare;
  let csv="带材编号,初筛人,复核人,最终轮次,轮次,总条数,错误数,错误率\n";
  d.rounds.forEach(it=>{
    csv+=`${d.stripNo},${d.screener},${d.reviewer},${d.finalRound},${it.round},${it.total},${it.err},${it.rate}\n`;
  });
  csv+="\n缺陷修改统计\n修改内容,数量,占比\n";
  d.changeStats.forEach(it=>{
    csv+=`"${it.change}",${it.count},${it.pct}\n`;
  });
  download(csv,"带材对比结果.csv");
}

async function exportFull(){
  const data=await getCloud();
  let csv="带材编号,初筛人,复核人,轮次,米数,缺陷名称\n";
  for(const no in data){
    const st=data[no];
    const scr=st.screener||"";
    const rev=st.reviewer||"";
    const rds=st.rounds||{};
    for(const r in rds){
      rds[r].forEach(it=>{
        csv+=`${no},${scr},${rev},${r},${it.meter},"${it.defect}"\n`;
      });
    }
  }
  download(csv,"带材全部数据.csv");
}

function download(csv,name){
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=name;
  a.click();
}
</script>
</body>
</html>
